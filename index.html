<!DOCTYPE html>
<html>
<head>
  <title>Ocean Heatwave Leaderboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      padding: 20px;
      text-align: center;
    }

    h1 { margin-bottom: 30px; }

    /* TOP 3 CARDS */
    .top3 {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 200px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .gold { border-top: 5px solid gold; }
    .silver { border-top: 5px solid silver; }
    .bronze { border-top: 5px solid #cd7f32; }

    .card h2 { margin: 10px 0; }

    /* TABLE */
    table {
      width: 80%;
      margin: auto;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #eee;
    }

  </style>
</head>

<body>

<h1>🏆 Ocean Heatwave Challenge</h1>

<div class="top3" id="top3"></div>

<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Name</th>
      <th>F1 Score</th>
      <th>Accuracy</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
fetch('leaderboard.csv')
.then(res => res.text())
.then(data => {

  let rows = data.trim().split('\n').slice(1).filter(r => r.trim() !== "");

  let parsed = rows.map(r => {
    let [name, acc, f1] = r.split(',');

    return {
      name,
      acc: parseFloat(acc),
      f1: parseFloat(f1)
    };
  });

  if(parsed.length === 0) {
    document.body.innerHTML += "<h2>No data found</h2>";
    return;
  }

  // Sort by F1
  parsed.sort((a,b) => b.f1 - a.f1);

  // TOP 3 CARDS
  const topDiv = document.getElementById("top3");

  const medals = ["🥇","🥈","🥉"];
  const classes = ["gold","silver","bronze"];

  for(let i=0;i<3 && i<parsed.length;i++){
    let p = parsed[i];

    topDiv.innerHTML += `
      <div class="card ${classes[i]}">
        <h2>${medals[i]}</h2>
        <h3>${p.name}</h3>
        <p>F1: ${p.f1.toFixed(3)}</p>
        <p>Acc: ${p.acc.toFixed(3)}</p>
      </div>
    `;
  }

  // TABLE
  const table = document.getElementById("table");

  parsed.forEach((p,i)=>{
    let row = `
      <tr>
        <td>${i+1}</td>
        <td>${p.name}</td>
        <td>${p.f1.toFixed(3)}</td>
        <td>${p.acc.toFixed(3)}</td>
      </tr>
    `;
    table.innerHTML += row;
  });

});
</script>

</body>
</html>
