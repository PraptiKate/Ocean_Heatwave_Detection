name: Update Leaderboard

permissions:
  contents: write

on:
  push:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas numpy scikit-learn

      - name: Run evaluation
        run: python evaluate.py

      #  DEBUG (optional but helpful)
      - name: Show result.json
        run: cat result.json

      - name: Update CSV
        run: |
          echo "Name,Accuracy,F1" > leaderboard.csv

          jq -c '.[]' result.json | while read row; do
            name=$(echo $row | jq -r '.name')
            acc=$(echo $row | jq -r '.accuracy')
            f1=$(echo $row | jq -r '.f1')

            echo "$name,$acc,$f1" >> leaderboard.csv
          done


      - name: Commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"

          git add leaderboard.csv
          git commit -m "update leaderboard" || echo "No changes"
          git push
